[project]
name = "music-react-video-splitter"
version = "0.1.0"
description = "CLI tool to split music reaction videos into individual segments using audio analysis"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "yt-dlp",
    "inaspeechsegmenter",
    "faster-whisper>=1.2.1",
    "tensorflow>=2.21.0",
]

[project.scripts]
splitter = "splitter:main"
